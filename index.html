<body>

<!-- GTM noscript -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5GL4L82H"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<main class="landing">
  <!-- 8개 섹션 이미지 (위에서 아래로) -->
  <section class="sec" data-reveal><img src="images/section-1.png" alt="연봉도 성격도 괜찮은데 왜 소개팅에서 자꾸 까일까요 — 리얼미 남성 이미지 컨설팅 비포애프터" loading="eager" /></section>
  <section class="sec" data-reveal><img src="images/section-2.png" alt="왜 리얼미여야 할까요 — 독보적인 분위기 설계" loading="lazy" /></section>
  <section class="sec" data-reveal><img src="images/section-3.png" alt="2000명 이상의 리얼 후기" loading="lazy" /></section>
  <section class="sec" data-reveal><img src="images/section-4.png" alt="단 한 번의 디렉팅으로 바뀐 분위기 — 실제 비포애프터 사례" loading="lazy" /></section>
  <section class="sec" data-reveal><img src="images/section-5.png" alt="만족도 99%의 기록 — 별점 후기" loading="lazy" /></section>
  <section class="sec" data-reveal><img src="images/section-6.png" alt="리얼미 3단계 솔루션 — 1:1 대면 상담, 프라이빗 피팅, 최종 큐레이션" loading="lazy" /></section>
  <section class="sec" data-reveal><img src="images/section-7.png" alt="서비스 진행 단계 — 상담 신청, 사전 설문, 방문 예약, 현장 디렉팅" loading="lazy" /></section>
  <section class="sec" data-reveal><img src="images/section-8.png" alt="서비스 운영 및 예약 안내" loading="lazy" /></section>

  <!-- 신청 폼 영역 -->
  <section id="apply" class="form-section" data-reveal>
    <h2 class="form-title">무료 이미지 진단 신청하기</h2>
    <p class="form-sub">신청해 주시면 입력하신 번호로<br>사전 설문지를 문자·카톡으로 보내드립니다</p>

    <div id="form-container">
      <form id="applyForm" novalidate>
        <div class="field">
          <label for="f-name">이름</label>
          <input type="text" id="f-name" name="name" placeholder="홍길동" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="f-age">나이</label>
          <input type="number" id="f-age" name="age" placeholder="예) 32" min="14" max="99" inputmode="numeric" required />
        </div>
        <div class="field">
          <label for="f-phone">전화번호</label>
          <input type="tel" id="f-phone" name="phone" placeholder="010-0000-0000" autocomplete="tel" inputmode="numeric" required />
        </div>

        <label class="consent">
          <input type="checkbox" id="f-consent" name="consent" required />
          <span>입력하신 <b>개인정보는 사전 설문지 발송에만</b> 사용됩니다. (필수 동의)</span>
        </label>

        <label class="consent">
          <input type="checkbox" id="f-consent2" name="consent2" required />
          <span>노쇼 방지를 위해 예약금이 발생하며, <b>예약 3일 전까지만 100% 환불</b>이 가능합니다. (필수 동의)</span>
        </label>

        <div class="form-notice">
          <p>주말 예약은 현재 마감되었습니다. 평일 예약만 가능합니다.</p>
          <p>상담 신청 후 사전질의서를 작성하셔야 예약이 가능합니다.</p>
        </div>

        <button type="submit" class="form-submit" id="applySubmit">사전 설문지 신청하기</button>
        <p class="form-msg" id="formMsg" role="status" aria-live="polite"></p>
      </form>
    </div>
  </section>
</main>

<!-- 스크롤 따라다니는 고정 푸터 배너 -->
<div class="sticky-cta" id="stickyCta" role="region" aria-label="상담 신청 배너">
  <div class="sticky-cta__inner">
    <span class="sticky-cta__text">첫 방문 혜택! <b>무료 이미지 진단</b></span>
    <a href="#apply" class="sticky-cta__btn" id="ctaBtn">상담 신청하기</a>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
